<!-- ════════════════════════════════════════════════════════════
  팔로우코리아 — 병원 섹션 재구성 패치 (9번 + 10번)
  설치 방법: followkorea.kr의 "HOSPITALS(精选合作医院)" 섹션을
  이 코드로 교체하고, </body> 앞에 <script> 블록을 추가하세요.

  구성:
  1. 6대 분야 카테고리 (그룹 상단, 이모티콘)
  2. ⭐ 추천 병원 2곳 (관리자가 백오피스에서 지정, 큰 카드)
  3. 일반 병원 그리드 (1/4 크기, 소팅 기능: 추천순/리뷰순/예약순)
  4. 기타서비스 (하단 별도 그룹, 큰 아이콘)
  ════════════════════════════════════════════════════════════ -->
<style>
  .fkh-section{padding:60px 20px;max-width:1200px;margin:0 auto;}
  .fkh-section-label{font-size:11px;font-weight:700;color:#d4af6a;letter-spacing:2px;text-align:center;margin-bottom:6px;}
  .fkh-section-title{font-size:26px;font-weight:700;color:#16202e;text-align:center;margin-bottom:10px;}
  .fkh-section-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:36px;}

  /* 6대 분야 카테고리 */
  .fkh-cat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:48px;}
  .fkh-cat-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px 10px;text-align:center;cursor:pointer;transition:.2s;}
  .fkh-cat-card:hover{border-color:#d4af6a;box-shadow:0 8px 24px rgba(212,175,106,0.15);transform:translateY(-3px);}
  .fkh-cat-card.active{border-color:#16202e;background:#16202e;}
  .fkh-cat-card.active .fkh-cat-name{color:#fff;}
  .fkh-cat-icon{font-size:32px;margin-bottom:8px;}
  .fkh-cat-name{font-size:13px;font-weight:600;color:#16202e;}

  /* 추천 병원 (상단 2곳) */
  .fkh-recommend-wrap{margin-bottom:48px;}
  .fkh-recommend-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#16202e;margin-bottom:16px;}
  .fkh-recommend-label .star{color:#d4af6a;}
  .fkh-recommend-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .fkh-recommend-card{position:relative;border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,0.08);transition:.2s;}
  .fkh-recommend-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,0.14);}
  .fkh-recommend-card .badge-recommend{position:absolute;top:14px;left:14px;background:linear-gradient(135deg,#d4af6a,#c79b4a);color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;z-index:2;}
  .fkh-recommend-img{width:100%;height:220px;object-fit:cover;background:#f1f5f9;}
  .fkh-recommend-info{padding:18px 20px;background:#fff;}
  .fkh-recommend-info .name{font-size:17px;font-weight:700;color:#16202e;margin-bottom:4px;}
  .fkh-recommend-info .desc{font-size:12px;color:#64748b;margin-bottom:10px;line-height:1.5;}
  .fkh-recommend-info .meta{display:flex;gap:14px;font-size:12px;color:#94a3b8;}
  .fkh-recommend-info .meta b{color:#d4af6a;}

  /* 소팅 바 */
  .fkh-sort-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:16px;}
  .fkh-sort-label{font-size:12px;color:#94a3b8;}
  .fkh-sort-btn{font-size:12px;padding:6px 14px;border-radius:16px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#64748b;transition:.15s;}
  .fkh-sort-btn:hover{border-color:#d4af6a;}
  .fkh-sort-btn.active{background:#16202e;color:#fff;border-color:#16202e;}

  /* 일반 병원 그리드 (1/4 크기) */
  .fkh-hosp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:56px;}
  .fkh-hosp-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;}
  .fkh-hosp-card:hover{border-color:#d4af6a;box-shadow:0 6px 18px rgba(0,0,0,0.08);transform:translateY(-2px);}
  .fkh-hosp-img{width:100%;height:90px;object-fit:cover;background:#f1f5f9;}
  .fkh-hosp-info{padding:10px 12px;}
  .fkh-hosp-info .name{font-size:12.5px;font-weight:700;color:#16202e;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fkh-hosp-info .cat-tag{font-size:9.5px;color:#d4af6a;background:#fdf8ef;padding:1px 7px;border-radius:8px;display:inline-block;margin-bottom:5px;}
  .fkh-hosp-info .meta{display:flex;justify-content:space-between;font-size:10.5px;color:#94a3b8;}
  .fkh-hosp-info .meta .rating{color:#d4af6a;font-weight:700;}

  /* 기타서비스 - 큰 아이콘 별도 그룹 */
  .fkh-other-section{background:#fafaf8;border-radius:24px;padding:48px 30px;}
  .fkh-other-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .fkh-other-card{background:#fff;border-radius:18px;padding:30px 20px;text-align:center;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,0.04);}
  .fkh-other-card:hover{box-shadow:0 10px 28px rgba(212,175,106,0.18);transform:translateY(-4px);}
  .fkh-other-icon{font-size:52px;margin-bottom:14px;}
  .fkh-other-name{font-size:16px;font-weight:700;color:#16202e;margin-bottom:8px;}
  .fkh-other-desc{font-size:12px;color:#64748b;line-height:1.5;}

  @media (max-width:900px){
    .fkh-cat-grid{grid-template-columns:repeat(3,1fr);}
    .fkh-hosp-grid{grid-template-columns:repeat(2,1fr);}
    .fkh-recommend-grid{grid-template-columns:1fr;}
    .fkh-other-grid{grid-template-columns:1fr;}
  }
</style>

<section class="fkh-section" id="fkh-hospitals-section">
  <div class="fkh-section-label">HOSPITALS</div>
  <div class="fkh-section-title">정선 협력 병원</div>
  <div class="fkh-section-sub">엄격한 심사를 거친 강남 최고의 의료기관만 추천합니다</div>

  <!-- 1. 6대 분야 카테고리 (그룹 상단) -->
  <div class="fkh-cat-grid" id="fkh-cat-grid"></div>

  <!-- 2. 추천 병원 2곳 (관리자 지정) -->
  <div class="fkh-recommend-wrap">
    <div class="fkh-recommend-label"><span class="star">⭐</span> 팔로우코리아 추천 병원</div>
    <div class="fkh-recommend-grid" id="fkh-recommend-grid"></div>
  </div>

  <!-- 3. 소팅 바 -->
  <div class="fkh-sort-bar">
    <span class="fkh-sort-label">정렬:</span>
    <button class="fkh-sort-btn active" data-sort="recommend" onclick="fkhSetSort('recommend')">추천순</button>
    <button class="fkh-sort-btn" data-sort="review" onclick="fkhSetSort('review')">리뷰순</button>
    <button class="fkh-sort-btn" data-sort="booking" onclick="fkhSetSort('booking')">예약순</button>
  </div>

  <!-- 4. 일반 병원 그리드 -->
  <div class="fkh-hosp-grid" id="fkh-hosp-grid"></div>

  <!-- 5. 기타서비스 (별도 그룹, 큰 아이콘) -->
  <div class="fkh-other-section">
    <div class="fkh-section-label" style="margin-bottom:6px;">EXTRA SERVICES</div>
    <div class="fkh-section-title" style="margin-bottom:30px;">기타 서비스</div>
    <div class="fkh-other-grid">
      <div class="fkh-other-card" onclick="fkhOpenService('vvip')">
        <div class="fkh-other-icon">👑</div>
        <div class="fkh-other-name">VVIP 컨시어지</div>
        <div class="fkh-other-desc">전담 코디네이터 동행<br>병원 예약부터 귀국까지</div>
      </div>
      <div class="fkh-other-card" onclick="fkhOpenService('interpret')">
        <div class="fkh-other-icon">🗣️</div>
        <div class="fkh-other-name">통역 서비스</div>
        <div class="fkh-other-desc">중국어·베트남어·태국어·영어<br>전문 통역 동행</div>
      </div>
      <div class="fkh-other-card" onclick="fkhOpenService('car')">
        <div class="fkh-other-icon">🚗</div>
        <div class="fkh-other-name">차량 서비스</div>
        <div class="fkh-other-desc">공항 픽업·병원 이동<br>관광 전용 차량</div>
      </div>
    </div>
  </div>
</section>

<script>
// ════════════════════════════════════════════════════════════
//  데이터 — 백오피스(펄스)와 연동 시 이 부분을 fetch로 교체
// ════════════════════════════════════════════════════════════

// 6대 분야 카테고리
const FKH_CATEGORIES = [
  { key: 'skin', icon: '✨', name: '피부과' },
  { key: 'plastic', icon: '💎', name: '성형외과' },
  { key: 'stemcell', icon: '🧬', name: '줄기세포' },
  { key: 'women', icon: '🌸', name: '여성의원' },
  { key: 'checkup', icon: '🩺', name: '건강검진' },
  { key: 'wellness', icon: '🍃', name: '한방·웰니스' },
];

// 추천 병원 2곳 — ★ 백오피스에서 관리자가 직접 지정 (지금은 placeholder)
let FKH_RECOMMENDED = [
  { id: 1, name: '신상성형외과', category: 'plastic', catName: '성형외과', desc: '강남 대표 성형 전문 병원, 풍부한 외국인 환자 시술 경험', img: '', rating: 4.9, reviewCount: 320 },
  { id: 2, name: 'GLOVI 글로비성형외과', category: 'plastic', catName: '성형외과', desc: '눈·코·윤곽 전문, 1:1 맞춤 상담 시스템', img: '', rating: 4.8, reviewCount: 215 },
];

// 일반 병원 목록 — ★ 백오피스(펄스)의 병원 관리 데이터와 연동
let FKH_HOSPITALS = [
  { id: 3, name: '루비클리닉', category: 'skin', catName: '피부과', img: '', rating: 4.7, reviewCount: 180, bookingCount: 95, recommendScore: 80 },
  { id: 4, name: '원셀의원', category: 'stemcell', catName: '줄기세포', img: '', rating: 4.8, reviewCount: 142, bookingCount: 70, recommendScore: 85 },
  { id: 5, name: '청담서클의원', category: 'skin', catName: '피부과', img: '', rating: 4.6, reviewCount: 98, bookingCount: 60, recommendScore: 70 },
  { id: 6, name: '셀리닉의원', category: 'stemcell', catName: '줄기세포', img: '', rating: 4.9, reviewCount: 65, bookingCount: 40, recommendScore: 90 },
  { id: 7, name: '강남서울안과', category: 'checkup', catName: '건강검진', img: '', rating: 4.7, reviewCount: 88, bookingCount: 35, recommendScore: 65 },
  { id: 8, name: 'JDH한방병원', category: 'wellness', catName: '한방·웰니스', img: '', rating: 4.5, reviewCount: 50, bookingCount: 30, recommendScore: 55 },
  { id: 9, name: '고운몸의원', category: 'plastic', catName: '성형외과', img: '', rating: 4.6, reviewCount: 75, bookingCount: 45, recommendScore: 60 },
  { id: 10, name: '강남다움의원', category: 'skin', catName: '피부과', img: '', rating: 4.7, reviewCount: 60, bookingCount: 38, recommendScore: 68 },
];

let fkhActiveCat = null;
let fkhCurrentSort = 'recommend';

function fkhRenderCategories(){
  const grid = document.getElementById('fkh-cat-grid');
  grid.innerHTML = FKH_CATEGORIES.map(c => `
    <div class="fkh-cat-card ${fkhActiveCat === c.key ? 'active' : ''}" onclick="fkhFilterCat('${c.key}')">
      <div class="fkh-cat-icon">${c.icon}</div>
      <div class="fkh-cat-name">${c.name}</div>
    </div>`).join('');
}

function fkhFilterCat(key){
  fkhActiveCat = (fkhActiveCat === key) ? null : key;
  fkhRenderCategories();
  fkhRenderHospitalGrid();
}

function fkhRenderRecommended(){
  const grid = document.getElementById('fkh-recommend-grid');
  grid.innerHTML = FKH_RECOMMENDED.map(h => `
    <div class="fkh-recommend-card" onclick="fkhOpenHospital(${h.id})">
      <span class="badge-recommend">⭐ 추천 병원</span>
      <img class="fkh-recommend-img" src="${h.img || 'https://via.placeholder.com/600x440/16202e/ffffff?text=' + encodeURIComponent(h.name)}" alt="${h.name}">
      <div class="fkh-recommend-info">
        <div class="name">${h.name}</div>
        <div class="desc">${h.desc}</div>
        <div class="meta"><span>${h.catName}</span><span>⭐ <b>${h.rating}</b> (${h.reviewCount})</span></div>
      </div>
    </div>`).join('');
}

function fkhSetSort(sort){
  fkhCurrentSort = sort;
  document.querySelectorAll('.fkh-sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  fkhRenderHospitalGrid();
}

function fkhRenderHospitalGrid(){
  let list = fkhActiveCat ? FKH_HOSPITALS.filter(h => h.category === fkhActiveCat) : FKH_HOSPITALS;
  list = [...list].sort((a, b) => {
    if(fkhCurrentSort === 'review') return b.reviewCount - a.reviewCount;
    if(fkhCurrentSort === 'booking') return b.bookingCount - a.bookingCount;
    return b.recommendScore - a.recommendScore; // recommend
  });
  const grid = document.getElementById('fkh-hosp-grid');
  grid.innerHTML = list.map(h => `
    <div class="fkh-hosp-card" onclick="fkhOpenHospital(${h.id})">
      <img class="fkh-hosp-img" src="${h.img || 'https://via.placeholder.com/300x180/f1f5f9/94a3b8?text=' + encodeURIComponent(h.name)}" alt="${h.name}">
      <div class="fkh-hosp-info">
        <div class="name">${h.name}</div>
        <span class="cat-tag">${h.catName}</span>
        <div class="meta"><span class="rating">⭐ ${h.rating}</span><span>리뷰 ${h.reviewCount}</span></div>
      </div>
    </div>`).join('') || '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#94a3b8;">해당 분야 병원이 없습니다</div>';
}

function fkhOpenHospital(id){
  // 기존 병원 상세 모달 함수가 있으면 그걸 호출 (예: openHospitalModal(id))
  if(typeof openHospitalModal === 'function') { openHospitalModal(id); return; }
  console.log('병원 상세 열기:', id);
}
function fkhOpenService(type){
  if(typeof openServiceModal === 'function') { openServiceModal(type); return; }
  console.log('서비스 신청 열기:', type);
}

// ════════════════════════════════════════════════════════════
//  백오피스(펄스) 연동 — 추천병원/일반병원 데이터 실시간 갱신
//  global_platform Supabase에서 hospitals 테이블을 읽어와 반영
// ════════════════════════════════════════════════════════════
async function fkhLoadFromSupabase(){
  const URL = 'https://qfncxamqeiyxkbjxwtoi.supabase.co';
  const KEY = 'sb_publishable_qaah2ieLZHqjBFsvi6Zwag_QsKYhWhV';
  try{
    const res = await fetch(`${URL}/rest/v1/hospitals?select=*`, {
      headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
    });
    if(!res.ok) return;
    const data = await res.json();
    // hospitals 테이블에 is_recommended(boolean), category, rating 등 필드가 있다고 가정
    // 실제 테이블 구조에 맞춰 매핑 필요 — 구조 확정 후 이 부분만 수정하면 됨
    if(Array.isArray(data) && data.length > 0){
      console.log('[FK] 백오피스 병원 데이터 로드됨:', data.length, '건 (매핑 로직은 hospitals 테이블 구조 확정 후 연결)');
    }
  }catch(e){
    console.warn('[FK] 백오피스 병원 데이터 로드 실패, 기본 데이터 사용', e);
  }
}

// 초기화
function fkhInit(){
  fkhRenderCategories();
  fkhRenderRecommended();
  fkhRenderHospitalGrid();
  fkhLoadFromSupabase();
}
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', fkhInit);
}else{
  fkhInit();
}
</script>
