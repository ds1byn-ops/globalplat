<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>스태프 로그인 검증 (임시)</title>
<style>
  body{font-family:-apple-system,'Malgun Gothic',sans-serif;max-width:460px;margin:40px auto;padding:0 18px;color:#1f2430}
  h1{font-size:18px;margin:0 0 4px}
  p.sub{color:#6b7280;font-size:13px;margin:0 0 22px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  input{width:100%;box-sizing:border-box;padding:11px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:15px}
  button{width:100%;margin-top:18px;padding:12px;border:0;border-radius:8px;background:#1F3864;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  button.sec{background:#e5e7eb;color:#374151;margin-top:8px}
  #out{margin-top:22px;padding:14px;border-radius:8px;font-size:13px;line-height:1.6;white-space:pre-wrap;display:none}
  .ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
  .box{background:#f9fafb;border:1px solid #eef0f3;color:#374151}
</style>
</head>
<body>
  <h1>스태프 로그인 검증</h1>
  <p class="sub">이 페이지는 정적 키를 쓰지 않습니다. 로그인 세션만으로 데이터가 읽히면 새 인증 방식이 정상입니다. (검증 후 삭제 예정)</p>

  <label>이메일</label>
  <input id="email" type="email" value="jeff@followkorea.co.kr" autocomplete="username">
  <label>비밀번호</label>
  <input id="pw" type="password" value="" autocomplete="current-password" placeholder="임시 비밀번호 입력">
  <button id="loginBtn">로그인 후 데이터 읽기 테스트</button>
  <button id="logoutBtn" class="sec">로그아웃</button>

  <div id="out"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPA_URL='https://qfncxamqeiyxkbjxwtoi.supabase.co';
    const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmbmN4YW1xZWl5eGtianh3dG9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjQzMjksImV4cCI6MjA5Njc0MDMyOX0.TOG3HuidoVHfVq4_ru4aU_9WclBgkv5gSvWnF6PK4NE';
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
    const out = document.getElementById('out');
    function show(cls,msg){ out.style.display='block'; out.className=cls; out.textContent=msg; }

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pw').value;
      show('box','로그인 시도 중…');
      const { data:auth, error:authErr } = await sb.auth.signInWithPassword({ email, password });
      if (authErr){ show('err','❌ 로그인 실패\n'+authErr.message+'\n\n→ 이메일/비밀번호를 확인하거나, 망고에게 알려주세요.'); return; }

      // 정적 키 없이, 로그인 세션만으로 보호 테이블 읽기 시도
      const { data:rows, error:qErr, count } = await sb
        .from('bookings').select('id', { count:'exact' }).limit(1);

      if (qErr){
        show('err','로그인은 됐지만 데이터 접근 거부됨\n로그인 계정: '+email+'\n'+qErr.message+'\n\n→ is_staff 명단에 이메일이 없을 수 있습니다. 망고에게 알려주세요.');
        return;
      }
      show('ok','✅ 전 구간 정상\n로그인 계정: '+email+'\nis_staff 통과 확인 (bookings 접근 성공, 총 '+(count??rows.length)+'건 조회 가능)\n\n→ 이 결과를 망고에게 알려주시면, 백오피스 로그인 전환·정적 키 제거를 이어서 진행합니다.');
    };

    document.getElementById('logoutBtn').onclick = async () => {
      await sb.auth.signOut(); show('box','로그아웃 완료.');
    };
  </script>
</body>
</html>
