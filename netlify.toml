# 정적 사이트 (빌드 없음). followkorea.kr은 GitHub Pages, gnfollow.com은 Netlify가 같은 repo를 서빙.
# 접속 도메인 감지(index.html의 SITE)로 gnfollow.com은 중국어 전용 + 유입 gnfollow 태깅.
[build]
  publish = "."
  command = ""

# 브라우저가 옛 버전 HTML을 캐시해 "최신이 안 뜨는" 문제 방지.
# max-age=0, must-revalidate → 브라우저가 매번 서버에 최신 여부를 확인(변경 없으면 304로 빠름).
# 단일 파일 HTML 사이트라 캐시할 별도 정적 에셋이 없어 성능 손해 없음.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
